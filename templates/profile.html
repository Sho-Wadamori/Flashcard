{% extends "layout.html" %}

{% block title %}Profile{% endblock %}

{% block body %}

<br><br>

<div style="display: flex; justify-content: space-between; margin: 30px 500px; gap: 200px">
    <div style="display: flex;">
        <div style="display: flex; flex-direction: column; text-align: center; gap: 0px;">
            <img src="{{ url_for('static', filename='assets/profile.png') }}" height="200px" width="200px" alt="">
            <h2>@{{ results[0] }}</h2>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; gap: 50px;">
            <button>Change</button>
            <button>Remove</button>
        </div>
    </div>
    <input type="text" style="width: 100%">
</div>

<br><br>

<div style="display: flex; flex-direction: column; margin: 30px 170px; gap: 15px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Username: </h3>
        <h3>{{ results[0] }}</h3>
        <button>Change</button>
        <div></div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Recovery Email: </h3>
        <h3>examp******@gmail.com</h3>
        <button>Change</button>
        <button>Remove</button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Username: </h3>
        <button style="width: 100%; margin: 0 0;">Reveal</button>
        <button>Change</button>
        <div></div>
    </div>
</div>

<div style="display: flex; margin: 0 170px">
    <button onclick="location.href='{{ url_for('logout') }}'" style="display: flex; color: rgb(255, 109, 109); width: 100%; height: 100%; font-size: 30px; justify-content: center;">LOG OUT</button>
</div>

<br>
<br>

<div style="display: flex; margin: 0 170px; border: 4px solid #cf6363; height: 350px; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h1 style="color: rgb(202, 0, 0);">DANGER ZONE</h1>
    <div style="display: flex; gap: 50px;">
        <button style="width: 250px; height: 80px; background-color: #cf6363; font-size: 20px;">DELETE ACCOUNT</button>
        <button style="width: 250px; height: 80px; background-color: #cf6363; font-size: 20px;">TRANSFER OWNERSHIP</button>
    </div>
</div>

<br>


{% endblock %}
