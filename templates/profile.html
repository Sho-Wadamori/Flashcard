{% extends "layout.html" %}

{% block title %}Profile{% endblock %}

{% block body %}

<!-- Error message -->
{% include "components/alerts.html" %}

<br>

<div style="display: flex; align-items: center; justify-content: space-around;">
    <button style="height: 50px; width: 25%;">Profile</button>
    <button style="height: 50px; width: 25%;">Settings</button>
    <button style="height: 50px; width: 25%;">Stats</button>
</div>

<div style="display: flex; justify-content: space-between; margin: 30px 500px; gap: 200px">
    <div style="display: flex; gap: 30px;">
        <div style="display: flex; flex-direction: column; text-align: center; gap: 0px;">
            <img src="{{ url_for('static', filename='assets/profile.png') }}" height="170px" width="170px" alt="profile picture">
            <h2>@{{ results[0] }}</h2>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; gap: 50px;">
            <button>Change</button>
            <button>Remove</button>
        </div>
    </div>
    <textarea name="textArea" id="textArea" style="width: 100%; resize: none;"></textarea>
</div>

<br><br>

<div style="display: flex; flex-direction: column; margin: 30px 170px; gap: 20px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Username: </h3>
        <h3>{{ results[0] }}</h3>
        <button>Change</button>
        <div></div>
    </div>

    <div id="viewEmail" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Recovery Email: </h3>
        <h3 id="email">{{ obfuscatedEmail }}</h3>
        <button onclick="
            document.getElementById('viewEmail').style.display = 'none';
            document.getElementById('changeEmail').style.display = 'grid';
        ">Change</button>
        <form action="{{ url_for('profile') }}" method="POST" id="removeEmail">
            <input type="hidden" name="action" value="remove">
            <button type="submit" style="width: 100%; height: 100%;">Remove</button>
        </form>
    </div>

    <form action="{{ url_for('profile') }}" method="POST" id="changeEmail" style="display: none; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <label>Recovery Email: </label>
        <input type="hidden" name="action" value="change">
        <input type="email" name="newEmail" value="{{ email }}">
        <input type="submit" value="Save">
        <button onclick="
            document.getElementById('changeEmail').style.display = 'none';
            document.getElementById('viewEmail').style.display = 'grid';
        ">Cancel</button>
    </form>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 40px;">
        <h3>Password: </h3>
        <button style="width: 100%; margin: 0 0;">Reveal</button>
        <button>Change</button>
        <div></div>
    </div>
</div>

<br>

<div style="display: flex; margin: 0 170px">
    <button onclick="location.href='{{ url_for('logout') }}'" style="display: flex; color: rgb(255, 109, 109); width: 100%; height: 100%; font-size: 30px; justify-content: center;">LOG OUT</button>
</div>

<br>
<br>

<div style="display: flex; margin: 0 170px; border: 4px solid #cf6363; height: 350px; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h1 style="color: rgb(202, 0, 0);">DANGER ZONE</h1>
    <div style="display: flex; gap: 50px;">
        <button style="width: 250px; height: 80px; background-color: #cf6363; font-size: 20px;">DELETE ACCOUNT</button>
        <button style="width: 250px; height: 80px; background-color: #cf6363; font-size: 20px;">RESET ACCOUNT</button>
    </div>
</div>

<br>


{% endblock %}
