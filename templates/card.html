{% extends "layout.html" %}
{% block body %}
<h2>Study</h2>

<h3>Card {{ index + 1 }} of {{ total }}</h3>

<!-- Previous card button -->
{% if index > 0 %}
    <a href="{{ url_for('Study', id=deck_id, index=index - 1) }}">
        <button id="prev_button" class="prev">Previous</button>
    </a>
{% endif %}

<!-- Next card button -->
{% if index + 1 < total %}
    <a href="{{ url_for('Study', id=deck_id, index=index + 1) }}">
        <button id="next_button" class="next">Next</button>
    </a>
{% else %}
    <a href="{{ url_for('Deck', id=deck_id) }}">
        <button id="exit_button" class="exit">Exit</button>
    </a>
    <p>You've completed the deck!</p>
{% endif %}

<!-- Show answer -->
{% if cards %}
  <button class="card" id="card_click">
    <h2 id="card">{{ cards[1] }}</h2>
  </button>
  
    <br><div class="tooltip" style="cursor: help;">
      Hint💡<span class="tooltiptext">{{ cards[4] }}</span>
    </div>

{% else %}
  <p>No cards in this deck.</p>
{% endif %}

<!-- Correct/Incorrect/Skip -->
<button id="prev_button" class="prev">Correct [1]</button> <button id="prev_button" class="prev">Incorrect [2]</button> <button id="prev_button" class="prev">Skip [3]</button>
<!-- DOES NOT DO ANYTHING YET -->


<script>

// Show answer when card is clicked
function clickAction(){
  if (card.textContent === "{{ cards[1] }}") {
    card.textContent = "{{ cards[2] }}";
  } 
  
  else {
    card.textContent = "{{ cards[1] }}";
  }
}

card_click.onclick = clickAction;

</script>
{% endblock %}
