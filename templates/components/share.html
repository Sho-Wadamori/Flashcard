<div id="share-popupOverlay" onclick="closeSharePopup()"></div>

<!-- share popup -->
<div id="share-popup" onclick="event.stopPropagation();" style="cursor: auto;">
    <h3>Share The "<span id="share-deckName"></span>" Deck</h3><br>
    <div class="shareButton-wrapper">
        <div class="share-buttons">
            <a id="share-whatsapp" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/whatsapp.png') }}" alt="whatsapp logo"></img>
                    WhatsApp
                </button>
            </a>
            <a id="share-email" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/email.png') }}" alt="email icon"></img>
                    Email
                </button>
            </a>
            <a id="share-facebook" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/facebook.png') }}" alt="facebook logo"></img>
                    Facebook
                </button>
            </a>
            <a id="share-twitter" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/twitter.png') }}" alt="twitter logo"></img>
                    Twitter / X
                </button>
            </a>
            <a id="share-reddit" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/reddit.png') }}" alt="reddit logo"></img>
                    Reddit
                </button>
            </a>
            <a id="share-pinterest" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/pinterest.png') }}" alt="pinterest logo"></img>
                    Pinterest
                </button>
            </a>
            <a id="share-linkedin" target="_blank">
                <button class="btn-ignore-all">
                    <img src="{{ url_for('static', filename='assets/linkedin.png') }}" alt="linkedin logo"></img>
                    LinkedIn
                </button>
            </a>
        </div><br>
        <button id="share-leftArrow" class="share-leftArrow btn-ignore-all" onclick="scrollShareButtons('left')"><</button>
        <button id="share-rightArrow" class="share-rightArrow btn-ignore-all" onclick="scrollShareButtons('right')">></button>
    </div>

    <div class="linkContainer">
        <input type="text" id="share-link" readonly>
        <button onclick="copyURL()">Copy</button>
    </div>

    <button onclick="closeSharePopup()" class="btn-ignore-all share-close">✖</button>

</div>

<!-- Copied URL Toast -->
<div id="toast"></div>




<script>

// ----- Share Popup -----
// define popup and overlay
const sharePopup = document.getElementById('share-popup');
const sharePopupOverlay = document.getElementById('share-popupOverlay');

const shareDeckName = document.getElementById('share-deckName');
const shareLink = document.getElementById('share-link');
const shareWhatsapp = document.getElementById('share-whatsapp');
const shareEmail = document.getElementById('share-email');
const shareFacebook = document.getElementById('share-facebook');
const shareTwitter = document.getElementById('share-twitter');
const shareReddit = document.getElementById('share-reddit');
const sharePinterest = document.getElementById('share-pinterest');
const shareLinkedIn = document.getElementById('share-linkedin');

// when share button is clicked
function openSharePopup(deckID, deckName) {
    const deckURL = `${window.location.origin}/deck/${deckID}`; // make deck url
    // share message converted to url format
    const message = encodeURIComponent(`Check out my ${deckName} flashcards! ${deckURL}\n${deckURL}`);
    
    shareDeckName.textContent = deckName; // set popup title to deck name
    shareLink.value = deckURL; // set share link to deck url
    // set all the share links with the message/deck url (some don't allow messages and some accept url parameters)
    shareWhatsapp.href = `https://api.whatsapp.com/send/?text=${message}`;
    shareEmail.href = `mailto:?subject=Check out this deck!&body=${message}`;
    shareFacebook.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(deckURL)}`;
    shareTwitter.href = `https://twitter.com/intent/tweet?text=${message}`;
    shareReddit.href = `https://www.reddit.com/submit?url=${encodeURIComponent(deckURL)}&title=${encodeURIComponent('Check out my ${deckName} flashcards!')}`;
    sharePinterest.href = `https://pinterest.com/pin/create/button/?url=${encodeURIComponent(deckURL)}&description=${encodeURIComponent('Check out my ${deckName} flashcards!')}`;
    shareLinkedIn.href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(deckURL)}`;

    // close all dropdowns
    closeAll()

    // check if popup is already open
    sharePopup.classList.toggle('open'); // add open class
    sharePopupOverlay.classList.toggle('open'); // add open class
}

// close popup
function closeSharePopup() {
    sharePopup.classList.remove('open'); // remove open class
    sharePopupOverlay.classList.remove('open'); // remove open class
}



// -----  Share Buttons Scrolling -----
// define share buttons container
const shareButtons = document.querySelector('.share-buttons');

// scroll share buttons
function scrollShareButtons(direction) {
    if (direction === 'left') {
        shareButtons.scrollBy({ left: -100, behavior: 'smooth' });
    } 
    else if (direction === 'right') {
        shareButtons.scrollBy({ left: 100, behavior: 'smooth' });
    }
    // update arrows after scroll
    updateScrollArrows()
};

// run on page load
updateScrollArrows()

// detect when user scrolls in share buttons
shareButtons.addEventListener('scroll', (event) => {
    updateScrollArrows()
})



// ----- Mouse Scroll to Scroll Share Buttons -----
// when mouse scroll is used on share buttons
shareButtons.addEventListener('wheel', (event) => {
    event.preventDefault(); // prevent vertical scroll
    shareButtons.scrollBy({ left: event.deltaY, behavior: 'smooth' }); // scroll horizontally
});



 // ----- Keybinds -----
document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowLeft') {
        scrollShareButtons('left');
    }
    if (event.key === 'ArrowRight') {
        scrollShareButtons('right');
    }

    // if escape is pressed, close popup
    if (event.key === 'Escape') {
        closeSharePopup();
    }
});



// ----- Update Scroll Arrow Visibility -----
// update scroll arrows
function updateScrollArrows() {
    // define arrows
    const leftArrow = document.getElementById('share-leftArrow');
    const rightArrow = document.getElementById('share-rightArrow');

    // get current scroll pos
    const scrollPos = shareButtons.scrollLeft;
    // get max scroll pos
    const maxScrollLeft = shareButtons.scrollWidth - shareButtons.clientWidth;

    
    // if scroll pos is at start
    if (scrollPos <= 0) {
        // hide left arrow
        leftArrow.style.display = 'none';
    }
    else {
        // show left arrow
        leftArrow.style.display = 'block';
    }

    // if scroll pos is at end
    if (scrollPos >= maxScrollLeft) {
        // hide right arrow
        rightArrow.style.display = 'none';
    }
    else {
        // show right arrow
        rightArrow.style.display = 'block';
    }
}



// ----- Toast -----
const toast = document.getElementById('toast');

function copyURL() {
    const URL = document.getElementById('share-link').value
    navigator.clipboard.writeText(URL); // copy to clipboard
    toast.classList.add('open');
    toast.innerText = "Copied URL to clipboard."
    setTimeout(() => {
        toast.classList.remove('open');
    }, 2000);
}

</script>
