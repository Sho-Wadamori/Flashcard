{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block body %}

<!-- Error message -->
{% include "components/alerts.html" %}

<br>

<div class="profileTabContainer">
    <button class="profileTabs" onclick="window.location='{{ url_for('profile') }}'">Profile</button>
    <button class="profileTabs" onclick="window.location='{{ url_for('settings') }}'">Settings</button>
    <button class="profileTabs" onclick="window.location='{{ url_for('stats') }}'">Stats</button>
</div>

<br>

<button style="width: 100%;" onclick="window.location='{{ url_for('theme') }}'">Theme</button>

<br>

<form action="{{ url_for('settings') }}" class="animimationToggle">
    <label for="animToggle">Animations</label>
    <input type="checkbox" name="animToggle" id="animToggle"><br>

    <br>
    
    <button type="submit">Save Changes</button>
</form>
<br>
<br>

<form action="{{ url_for('settings') }}" method="POST" id="removeEmail">
    <input type="hidden" name="action" value="remove">
    <button type="submit" style="width: 100%; height: 100%;">Remove</button>
</form>

{% endblock %}
