{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block body %}

<!-- Error message -->
{% include "components/alerts.html" %}

<br>

<div style="display: flex; align-items: center; justify-content: space-around;">
    <button style="height: 50px; width: 25%;" onclick="window.location='{{ url_for('profile') }}'">Profile</button>
    <button style="height: 50px; width: 25%;" onclick="window.location='{{ url_for('settings') }}'">Settings</button>
    <button style="height: 50px; width: 25%;" onclick="window.location='{{ url_for('stats') }}'">Stats</button>
</div>

<form action="{{ url_for('settings') }}" method="POST" id="removeEmail">
    <input type="hidden" name="action" value="remove">
    <button type="submit" style="width: 100%; height: 100%;">Remove</button>
</form>

{% endblock %}
